name: Kernel Build (munch)

on:
  workflow_dispatch:
    inputs:
      BUILD_TITLE:
        description: 'Custom Build Title'
        required: false
      KERNEL_TREE:
        description: 'Kernel Tree'
        default: 'https://github.com/Sarthak7teen/kernel_xiaomi_sm8250.git'
        required: true
      KERNEL_TREE_BRANCH:
        description: 'Kernel Tree Branch'
        required: true
        default: 'staging'
      CODENAME:
        description: 'Phone Codename'
        default: 'munch'
        required: true
      ANYKERNEL_URL:
        description: 'AnyKernel URL (leave blank to skip zip)'
        default: 'https://github.com/osm0sis/AnyKernel3'
        required: false
      ANYKERNEL_BRANCH:
        description: 'AnyKernel Branch'
        default: 'master'
        required: false
      CLANG_URL:
        description: 'Clang tarball URL (leave blank for default clang-r563880)'
        default: 'https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/20052113d2a5552cfff78ac7b21fd7953cc1c592/clang-r563880.tar.gz'
        required: false
      SEND_NOTIFICATION:
        description: 'Send Telegram Notification'
        type: boolean
        default: false
      ENABLE_KERNELSU:
        description: 'KernelSU'
        type: boolean
        default: false
      UPLOAD_TO_RELEASE:
        description: 'Upload to Release'
        type: boolean
        default: false

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:

    - name: Display User Inputs
      run: |
        echo "::group::User Environment Variables"
        echo "Custom Build Title: ${{ github.event.inputs.BUILD_TITLE }}"
        echo "Kernel Tree: ${{ github.event.inputs.KERNEL_TREE }}/tree/${{ github.event.inputs.KERNEL_TREE_BRANCH }}"
        echo "Codename: ${{ github.event.inputs.CODENAME }}"
        echo "AnyKernel URL: ${{ github.event.inputs.ANYKERNEL_URL }}/tree/${{ github.event.inputs.ANYKERNEL_BRANCH }}"
        echo "KernelSU: ${{ fromJSON('["No", "Yes"]')[fromJSON(github.event.inputs.ENABLE_KERNELSU)] }}"
        echo "Clang URL: ${{ github.event.inputs.CLANG_URL || 'default clang-r563880' }}"
        echo "::endgroup::"

    - name: Initialize workspace
      run: |
        mkdir workspace
        cd workspace
        echo "workspace-folder=$(pwd)" >> $GITHUB_OUTPUT
        echo "start_time=$(date +%s)" >> $GITHUB_OUTPUT
        echo "kernelsu=${{ fromJSON('["No", "Yes"]')[fromJSON(github.event.inputs.ENABLE_KERNELSU)] }}" >> $GITHUB_OUTPUT
        echo "build_title=${{ github.event.inputs.BUILD_TITLE || github.event.inputs.CODENAME }}" >> $GITHUB_OUTPUT
      id: workspace

    - name: Prepare the build environment
      run: |
        sudo apt-get update -y
        sudo apt-get install -y flex libncurses5 libncurses-dev bc zip
        # Clone GCC toolchains
        git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 \
          -b android-msm-redbull-4.19-android14 --depth=1
        git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 \
          -b android-msm-redbull-4.19-android14 --depth=1
        # Download Clang
        CLANG_URL="${{ github.event.inputs.CLANG_URL || 'https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/20052113d2a5552cfff78ac7b21fd7953cc1c592/clang-r563880.tar.gz' }}"
        echo "Using clang: $CLANG_URL"
        wget -nv "$CLANG_URL" -O clang.tar.gz
        mkdir clang
        if [[ "$CLANG_URL" == *.tar.xz ]]; then
          tar -xf clang.tar.gz -C clang
        else
          tar -xzf clang.tar.gz -C clang
        fi
        cd clang
        if [ -d clang-* ]; then
          mv clang-*/* .
        fi
        cd ..
        rm clang.tar.gz
        echo "tools-folder=$(pwd)" >> $GITHUB_OUTPUT
      working-directory: ${{ steps.workspace.outputs.workspace-folder }}
      id: tools

    - name: Clone kernel source
      run: |
        git clone --depth=1 ${{ github.event.inputs.KERNEL_TREE }} \
          -b ${{ github.event.inputs.KERNEL_TREE_BRANCH }} kernel_tree
        cd kernel_tree
        git submodule init && git submodule update
        echo "kernel-folder=$(pwd)" >> $GITHUB_OUTPUT
      working-directory: ${{ steps.workspace.outputs.workspace-folder }}
      id: kernel

    - name: Building kernel
      run: |
        export ARCH=arm64
        export SUBARCH=ARM64
        export KBUILD_BUILD_USER="Sarthak"
        export KBUILD_BUILD_HOST="munch"
        export PATH="${{ steps.tools.outputs.tools-folder }}/clang/bin:$PATH"
        # Load defconfig
        make O=out vendor/munch_defconfig \
          PATH="${{ steps.tools.outputs.tools-folder }}/clang/bin:$PATH"
        # Auto-answer new config questions
        make O=out olddefconfig \
          PATH="${{ steps.tools.outputs.tools-folder }}/clang/bin:$PATH"
        # Build kernel
        make O=out CC=clang -j$(nproc --all) \
          PATH="${{ steps.tools.outputs.tools-folder }}/clang/bin:$PATH" \
          CROSS_COMPILE=aarch64-linux-gnu- \
          LLVM=1 LLVM_IAS=1
        echo "elapsed_time=$(echo "$(date +%s)"-"${{ steps.workspace.outputs.start_time }}" | bc)" >> $GITHUB_OUTPUT
      working-directory: ${{ steps.kernel.outputs.kernel-folder }}
      id: build

    - name: Package with AnyKernel3
      if: ${{ success() && github.event.inputs.ANYKERNEL_URL != '' }}
      run: |
        # Set branch
        if [[ -z "${{ github.event.inputs.ANYKERNEL_BRANCH }}" ]]; then
          anykernel_branch=${{ github.event.inputs.CODENAME }}
        else
          anykernel_branch=${{ github.event.inputs.ANYKERNEL_BRANCH }}
        fi
        # Clone AnyKernel3
        git clone --recursive --depth=1 ${{ github.event.inputs.ANYKERNEL_URL }} \
          -b $anykernel_branch AnyKernel3
        # Copy kernel image (prefer Image over Image.gz-dtb)
        if [ -e "Image" ]; then
          cp -f Image AnyKernel3/
        elif [ -e "Image.gz-dtb" ]; then
          cp -f Image.gz-dtb AnyKernel3/
        elif [ -e "Image.gz" ]; then
          cp -f Image.gz AnyKernel3/
        fi
        # Copy dtb and dtbo if they exist
        [ -e "dtb" ] && cp -f dtb AnyKernel3/
        [ -e "dtbo.img" ] && cp -f dtbo.img AnyKernel3/
        # Create zip
        ZIPNAME="N0Kernel-${{ github.event.inputs.CODENAME }}${{ fromJSON('["", "-KSU"]')[fromJSON(github.event.inputs.ENABLE_KERNELSU)] }}-$(date +%Y%m%d-%H%M).zip"
        cd AnyKernel3
        zip -q -r ../$ZIPNAME . -x '*.git*'
        cd ..
        echo "zipname=$ZIPNAME" >> $GITHUB_OUTPUT
        echo "zippath=$(pwd)/$ZIPNAME" >> $GITHUB_OUTPUT
      working-directory: ${{ steps.kernel.outputs.kernel-folder }}/out/arch/arm64/boot/
      id: anykernel

    - name: Check output directory
      run: |
        echo "=== Boot files ==="
        ls -alh ${{ steps.kernel.outputs.kernel-folder }}/out/arch/arm64/boot/ | grep -v "^d"
        echo "=== Zip file ==="
        ls -alh ${{ steps.kernel.outputs.kernel-folder }}/out/arch/arm64/boot/*.zip 2>/dev/null || echo "No zip found"

    - name: Upload ZIP as artifact
      if: ${{ success() && steps.anykernel.outputs.zipname != '' && github.event.inputs.UPLOAD_TO_RELEASE != 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.anykernel.outputs.zipname }}
        path: ${{ steps.kernel.outputs.kernel-folder }}/out/arch/arm64/boot/${{ steps.anykernel.outputs.zipname }}

    - name: Upload Image as artifact (fallback)
      if: ${{ success() && github.event.inputs.UPLOAD_TO_RELEASE != 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: Image
        path: ${{ steps.kernel.outputs.kernel-folder }}/out/arch/arm64/boot/Image

    - name: Upload dtbo as artifact
      if: ${{ success() && github.event.inputs.UPLOAD_TO_RELEASE != 'true' }}
      uses: actions/upload-artifact@v4
      continue-on-error: true
      with:
        name: dtbo.img
        path: ${{ steps.kernel.outputs.kernel-folder }}/out/arch/arm64/boot/dtbo.img

    - name: Upload to Release
      if: ${{ success() && github.event.inputs.UPLOAD_TO_RELEASE == 'true' }}
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ${{ steps.kernel.outputs.kernel-folder }}/out/arch/arm64/boot/${{ steps.anykernel.outputs.zipname }}
          ${{ steps.kernel.outputs.kernel-folder }}/out/arch/arm64/boot/Image
        name: ${{ steps.workspace.outputs.build_title }}-${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: |
          <b>${{ steps.workspace.outputs.build_title }}</b>
          <b>Kernel successfully built!</b> took ${{ steps.build.outputs.elapsed_time }} seconds.

          <b>Kernel tree</b>: ${{ github.event.inputs.KERNEL_TREE }}/tree/${{ github.event.inputs.KERNEL_TREE_BRANCH }}
          <b>KernelSU</b>: ${{ steps.workspace.outputs.kernelsu }}
          <b>Action</b>: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Send Telegram notification (success)
      uses: appleboy/telegram-action@master
      env:
        TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}
      if: ${{ success() && env.TELEGRAM_TO != '' && github.event.inputs.SEND_NOTIFICATION == 'true' }}
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        disable_web_page_preview: true
        format: html
        document: ${{ steps.kernel.outputs.kernel-folder }}/out/arch/arm64/boot/${{ steps.anykernel.outputs.zipname }}
        message: |
          ✅ <b>${{ steps.workspace.outputs.build_title }}</b>
          <b>Kernel built successfully!</b> took ${{ steps.build.outputs.elapsed_time }} seconds.

          <b>Kernel tree</b>: ${{ github.event.inputs.KERNEL_TREE }}/tree/${{ github.event.inputs.KERNEL_TREE_BRANCH }}
          <b>KernelSU</b>: ${{ steps.workspace.outputs.kernelsu }}
          <b>Action</b>: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    - name: Send Telegram notification (failure)
      uses: appleboy/telegram-action@master
      env:
        TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}
      if: ${{ failure() && env.TELEGRAM_TO != '' && github.event.inputs.SEND_NOTIFICATION == 'true' }}
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        disable_web_page_preview: true
        format: html
        message: |
          ❌ <b>${{ steps.workspace.outputs.build_title }}</b>
          <b>Kernel build failed!</b>

          <b>Kernel tree</b>: ${{ github.event.inputs.KERNEL_TREE }}/tree/${{ github.event.inputs.KERNEL_TREE_BRANCH }}
          <b>KernelSU</b>: ${{ steps.workspace.outputs.kernelsu }}
          <b>Action</b>: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      continue-on-error: true
